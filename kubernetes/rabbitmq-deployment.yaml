apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-default-user
  namespace: default
type: Opaque
stringData:
  default_user.conf: |
    default_user = guest
    default_pass = guest
---
apiVersion: rabbitmq.com/v1beta1
kind: RabbitmqCluster
metadata:
  name: rabbitmq
  namespace: default
spec:
  replicas: 1
  persistence:
    storageClassName: standard
    storage: 10Gi
  secretBackend:
    externalSecret:
      name: rabbitmq-default-user